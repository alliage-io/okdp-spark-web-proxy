<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,1 L9,5 L0,9" fill="none" stroke="#000000" stroke-width="1.4"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="470" fill="#ffffff"/>

  <!-- edges -->
  <g stroke="#000000" stroke-width="1.1" fill="none">
    <line x1="164" y1="238" x2="200" y2="238" marker-end="url(#arrow)"/>
    <line x1="322" y1="238" x2="364" y2="238" marker-end="url(#arrow)"/>
    <line x1="548" y1="222" x2="744" y2="124" marker-end="url(#arrow)"/>
    <line x1="548" y1="238" x2="744" y2="238" marker-end="url(#arrow)"/>
    <line x1="548" y1="256" x2="744" y2="344" marker-end="url(#arrow)"/>
    <line x1="460" y1="278" x2="460" y2="368" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  </g>

  <!-- edge labels (placed in clear gaps, off the lines) -->
  <g font-size="11" fill="#000000">
    <text x="182" y="231" text-anchor="middle">HTTP</text>
    <text x="620" y="128" text-anchor="middle">completed apps + UI assets</text>
    <text x="646" y="228" text-anchor="middle">running apps, live UI</text>
    <text x="450" y="327" text-anchor="end">watches pods spark-role=driver</text>
  </g>

  <!-- nodes -->
  <g fill="#ffffff" stroke="#000000">
    <rect x="24"  y="210" width="140" height="56" rx="28" stroke-width="1"/>
    <rect x="210" y="212" width="112" height="52" rx="6"  stroke-width="1"/>
    <rect x="372" y="200" width="176" height="78" rx="8"  stroke-width="1.5"/>
    <rect x="748" y="92"  width="228" height="56" rx="6"  stroke-width="1"/>
    <rect x="748" y="210" width="228" height="56" rx="6"  stroke-width="1"/>
    <rect x="748" y="320" width="228" height="56" rx="6"  stroke-width="1"/>
    <rect x="372" y="372" width="176" height="56" rx="6"  stroke-width="1"/>
  </g>

  <g fill="#000000" text-anchor="middle">
    <text x="94"  y="242" font-size="13">User / Browser</text>
    <text x="266" y="242" font-size="13">Ingress</text>

    <text x="460" y="234" font-size="14" font-weight="bold">spark-web-proxy</text>
    <text x="460" y="254" font-size="10">reverse proxy</text>

    <text x="862" y="116" font-size="13">Spark History Server</text>
    <text x="862" y="134" font-size="10">:18080</text>

    <text x="862" y="234" font-size="13">Spark Driver Pod</text>
    <text x="862" y="252" font-size="10">spark-ui :4040</text>

    <text x="862" y="344" font-size="13">Spark Driver Pod</text>
    <text x="862" y="362" font-size="10">spark-ui :4040</text>

    <text x="460" y="396" font-size="13">Kubernetes API</text>
    <text x="460" y="414" font-size="10">pods: list / watch</text>
  </g>
</svg>
